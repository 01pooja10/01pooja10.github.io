<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Pooja Ravi — Blog</title>
    <link href="https://fonts.cdnfonts.com/css/libertinus-mono" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mea+Culpa&display=swap" rel="stylesheet">
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <style>
        :root {
            --cream: #f5f0e8;
            --cream-dim: #c8c0b2;
            --gold: #c9a84c;
            --gold-light: #dfc678;
            --gold-dark: #a07d2e;
            --wine: #7a3b4e;
            --deep: #1a1410;
            --card-bg: rgba(18, 14, 10, 0.82);
            --card-border: rgba(201, 168, 76, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--deep);
            color: var(--cream);
            font-family: 'Libertinus Mono', monospace;
            font-weight: 400;
            line-height: 1.85;
            overflow-x: hidden;
        }

        ::selection {
            background: var(--gold);
            color: var(--deep);
        }

        /* ─── FLOATING BACKGROUND ─── */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-image {
            width: 120%; height: 120%;
            object-fit: cover;
            position: absolute;
            top: -10%; left: -10%;
            animation: bgFloat 30s ease-in-out infinite;
            opacity: 0.40;
            filter: saturate(0.8) brightness(0.65);
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(15px, -20px) scale(1.02); }
            50% { transform: translate(-10px, 10px) scale(1.01); }
            75% { transform: translate(10px, 15px) scale(1.03); }
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(122,59,78,0.06) 0%, transparent 60%),
                linear-gradient(180deg, rgba(26,20,16,0.4) 0%, transparent 30%, transparent 70%, rgba(26,20,16,0.6) 100%);
            pointer-events: none;
        }

        .content { position: relative; z-index: 10; }

        /* ─── NAV ─── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 22px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(30px);
            background: rgba(26,20,16,0.7);
            border-bottom: 1px solid var(--card-border);
        }

        .nav-name {
            font-family: 'Mea Culpa', cursive;
            font-size: 1.6rem;
            color: var(--gold);
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 6px; align-items: center; }

        .nav-links a {
            color: var(--cream-dim);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 100px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            color: var(--gold);
            background: rgba(201,168,76,0.08);
        }

        .nav-links a.active {
            color: var(--deep);
            background: var(--gold);
        }

        /* ─── POST HEADER ─── */
        .post-header {
            max-width: 820px;
            margin: 0 auto;
            padding: 160px 40px 40px;
        }

        .post-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--cream-dim);
            font-size: 0.82rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 40px;
            transition: color 0.3s;
        }

        .post-back:hover { color: var(--gold); }

        .post-title {
            font-family: 'Mea Culpa', cursive;
            font-size: clamp(3rem, 6vw, 5rem);
            color: var(--gold);
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .post-subtitle {
            font-size: 1rem;
            color: var(--cream-dim);
            font-style: italic;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .post-meta {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 0.8rem;
            color: var(--cream-dim);
            padding-bottom: 30px;
            border-bottom: 1px solid var(--card-border);
        }

        .post-meta .tag {
            padding: 4px 12px;
            border-radius: 100px;
            border: 1px solid var(--card-border);
            font-size: 0.72rem;
        }

        /* ─── ARTICLE BODY ─── */
        .post-body {
            max-width: 820px;
            margin: 0 auto;
            padding: 50px 40px 100px;
        }

        /* Markdown rendered styles */
        .post-body h1 {
            font-family: 'Mea Culpa', cursive;
            font-size: 2.8rem;
            color: var(--gold);
            margin: 50px 0 20px;
            line-height: 1.2;
        }

        .post-body h2 {
            font-family: 'Mea Culpa', cursive;
            font-size: 2.2rem;
            color: var(--gold);
            margin: 50px 0 16px;
            line-height: 1.2;
        }

        .post-body h3 {
            font-family: 'Mea Culpa', cursive;
            font-size: 1.8rem;
            color: var(--gold-light);
            margin: 40px 0 14px;
            line-height: 1.3;
        }

        .post-body p {
            font-size: 0.92rem;
            color: var(--cream);
            margin-bottom: 20px;
            line-height: 1.9;
        }

        .post-body em {
            color: var(--cream-dim);
        }

        .post-body strong {
            color: var(--gold-light);
            font-weight: 600;
        }

        .post-body a {
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid rgba(201,168,76,0.3);
            transition: border-color 0.3s;
        }

        .post-body a:hover {
            border-bottom-color: var(--gold);
        }

        .post-body img {
            max-width: 100%;
            border-radius: 10px;
            margin: 30px 0;
            border: 1px solid var(--card-border);
        }

        .post-body blockquote {
            border-left: 3px solid var(--gold);
            padding: 16px 24px;
            margin: 24px 0;
            background: rgba(201,168,76,0.05);
            border-radius: 0 10px 10px 0;
            font-size: 0.9rem;
            color: var(--cream-dim);
        }

        .post-body blockquote p {
            margin-bottom: 8px;
            color: var(--cream-dim);
        }

        .post-body blockquote p:last-child {
            margin-bottom: 0;
        }

        .post-body ul, .post-body ol {
            padding-left: 24px;
            margin-bottom: 20px;
        }

        .post-body li {
            font-size: 0.92rem;
            margin-bottom: 8px;
            color: var(--cream);
            line-height: 1.8;
        }

        .post-body li::marker {
            color: var(--gold);
        }

        .post-body code {
            background: rgba(201,168,76,0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: var(--gold-light);
        }

        .post-body pre {
            background: rgba(18, 14, 10, 0.9);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 24px;
            overflow-x: auto;
            margin: 24px 0;
        }

        .post-body pre code {
            background: none;
            padding: 0;
            font-size: 0.85rem;
            color: var(--cream-dim);
        }

        .post-body hr {
            border: none;
            height: 1px;
            background: var(--card-border);
            margin: 50px 0;
        }

        /* ─── FOOTER ─── */
        .post-footer {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 40px 60px;
            text-align: center;
        }

        .post-footer a {
            display: inline-block;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--cream-dim);
            padding: 12px 28px;
            border: 1px solid var(--card-border);
            border-radius: 100px;
            transition: all 0.3s;
        }

        .post-footer a:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        footer {
            text-align: center;
            padding: 36px;
            font-size: 0.75rem;
            color: var(--cream-dim);
            border-top: 1px solid var(--card-border);
            letter-spacing: 1px;
        }

        /* ─── LOADING STATE ─── */
        .loading {
            text-align: center;
            padding: 100px 40px;
            color: var(--cream-dim);
            font-size: 0.9rem;
        }

        .loading-spinner {
            width: 30px; height: 30px;
            border: 2px solid var(--card-border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out both;
        }

        @media (max-width: 700px) {
            nav { padding: 16px 20px; }
            .post-header, .post-body, .post-footer { padding-left: 20px; padding-right: 20px; }
            .post-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div class="bg-wrapper">
    <img src="assets/bg.png" alt="" class="bg-image">
</div>
<div class="bg-overlay"></div>

<div class="content">
    <nav>
        <a href="index.html" class="nav-name">Pooja Ravi</a>
        <div class="nav-links">
            <a href="index.html">Resume</a>
            <a href="blogs.html" class="active">Blogs</a>
        </div>
    </nav>

    <div class="post-header fade-in">
        <a href="blogs.html" class="post-back">&larr; Back to all posts</a>
        <h1 class="post-title" id="post-title"></h1>
        <p class="post-subtitle" id="post-subtitle"></p>
        <div class="post-meta" id="post-meta"></div>
    </div>

    <article class="post-body" id="post-body">
        <div class="loading">
            <div class="loading-spinner"></div>
            Loading post...
        </div>
    </article>

    <div class="post-footer">
        <a href="blogs.html">&larr; Back to all posts</a>
    </div>

    <footer>Pooja Ravi &copy; 2025</footer>
</div>

<script>
    // ─── POST REGISTRY ───
    // Add new posts here. The slug must match the .md filename in /posts/
    const posts = {
        "autoencoders": {
            title: "The Buzz Around Generative AI: Autoencoders",
            subtitle: "Part two of the Generative AI blog series. Exploring autoencoders, denoising autoencoders, VAEs, and VQ-VAEs with mathematical intuitions.",
            date: "Jul 5, 2023",
            readTime: "10 min read",
            tags: ["Generative AI", "Autoencoders", "VAE"]
        },
        "genai-intro": {
            title: "The Buzz Around Generative AI: Introduction",
            subtitle: "A preamble to a comprehensive series on generative models covering VAEs, GANs, normalizing flows, stable diffusion, and GPTs.",
            date: "Jun 29, 2023",
            readTime: "6 min read",
            tags: ["Generative AI", "Deep Learning"]
        },
        "movie-recommender": {
            title: "Build a Personalized Movie Recommender System",
            subtitle: "How content-streaming giants use recommender systems, and how to build one from scratch.",
            date: "Mar 18, 2021",
            readTime: "8 min read",
            tags: ["Recommender Systems", "Machine Learning"]
        },
        "chatbots": {
            title: "Chatbots: The Neoteric Way to Text",
            subtitle: "Build an interactive NLP-based chatbot in Python that can provide information about Autism.",
            date: "Feb 3, 2021",
            readTime: "7 min read",
            tags: ["NLP", "Chatbots", "Keras"]
        },
        "time-series-code": {
            title: "Time Series Forecasting — Code Edition",
            subtitle: "The practical companion implementing ARIMA, SARIMA, and more in Python.",
            date: "Jan 10, 2021",
            readTime: "9 min read",
            tags: ["Time Series", "ARIMA", "Python"]
        },
        "keras-image-gen": {
            title: "Handling Images Deftly Using Keras' Image Data Generator",
            subtitle: "A deep dive into Keras' ImageDataGenerator for augmentation, rescaling, and resizing.",
            date: "Dec 16, 2020",
            readTime: "6 min read",
            tags: ["Keras", "Data Augmentation"]
        },
        "time-series-math": {
            title: "Time Series Forecasting — Math Edition",
            subtitle: "Forecasting the future without time machines, but not without math.",
            date: "Dec 6, 2020",
            readTime: "8 min read",
            tags: ["Time Series", "Statistics"]
        },
        "heart-disease": {
            title: "Predicting Heart Disease with Machine Learning",
            subtitle: "A detailed end-to-end machine learning project walkthrough for heart disease classification.",
            date: "Sep 18, 2020",
            readTime: "7 min read",
            tags: ["Healthcare", "Classification"]
        }
    };

    // ─── LOAD POST ───
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('post');

    if (slug && posts[slug]) {
        const meta = posts[slug];

        // Set page title
        document.getElementById('page-title').textContent = `${meta.title} — Pooja Ravi`;

        // Fill header
        document.getElementById('post-title').textContent = meta.title;
        document.getElementById('post-subtitle').textContent = meta.subtitle;

        // Build meta row
        const metaHtml = `
            <span>${meta.date}</span>
            <span>&middot;</span>
            <span>${meta.readTime}</span>
            <span>&middot;</span>
            ${meta.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        `;
        document.getElementById('post-meta').innerHTML = metaHtml;

        // Configure marked
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Fetch and render markdown
        fetch(`posts/${slug}.md`)
            .then(res => {
                if (!res.ok) throw new Error('Post not found');
                return res.text();
            })
            .then(md => {
                document.getElementById('post-body').innerHTML = marked.parse(md);
                document.getElementById('post-body').classList.add('fade-in');
            })
            .catch(() => {
                document.getElementById('post-body').innerHTML = `
                    <div class="loading">
                        <p>Post not found. <a href="blogs.html" style="color:var(--gold)">Return to blogs</a>.</p>
                    </div>
                `;
            });
    } else {
        document.getElementById('post-body').innerHTML = `
            <div class="loading">
                <p>No post specified. <a href="blogs.html" style="color:var(--gold)">Browse all posts</a>.</p>
            </div>
        `;
    }
</script>
</body>
</html>
